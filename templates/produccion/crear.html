{% extends "base.html" %}

{% block content %}
<h1>Crear producto</h1>

<form method="POST">
    Nombre: <input type="text" name="nombre"><br>
    Cantidad: <input type="number" name="cantidad"><br>
    Precio: <input type="number" step="0.01" name="precio"><br>

    <button type="submit">Guardar</button>
</form>

{% endblock %}
