{% extends "base.html" %}

{% block content %}
<h2>Actividades</h2>

<a href="{{ url_for('actividades.crear') }}">Nueva actividad</a>

<table border="1">
<tr>
    <th>ID</th>
    <th>Descripción</th>
    <th>Fecha</th>
    <th>Cultivo</th>
    <th>Acciones</th>
</tr>

{% for a in actividades %}
<tr>
    <td>{{ a.id }}</td>
    <td>{{ a.descripcion }}</td>
    <td>{{ a.fecha }}</td>
    <td>{{ a.cultivo }}</td>
    <td>
        <!-- ✏️ EDITAR -->
        <a href="{{ url_for('actividades.editar', id=a.id) }}">✏️</a>

        <!-- 🗑️ ELIMINAR -->
        <a href="{{ url_for('actividades.eliminar', id=a.id) }}"
           onclick="return confirm('¿Seguro que deseas eliminar?')">
           🗑️
        </a>
    </td>
</tr>
{% endfor %}

</table>
{% endblock %}
