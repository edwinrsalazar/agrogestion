<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Agrícola - Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>

<video autoplay muted loop class="video-fondo">
    <source src="{{ url_for('static', filename='img/video_2.mp4') }}" type="video/mp4">
</video>

<header class="H1">
    <h1>BIENVENIDO A AGROGESTIÓN</h1>
</header>

<main>
    <div class="login-container">
        <h2>Iniciar Sesión</h2>

        {% if error %}
            <div class="alert">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('auth.login') }}" method="POST">

            <label>Usuario</label>
            <input type="text" name="username" placeholder="Ingrese su usuario" required>

            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Ingrese su contraseña" required>

            <div class="recordarme">
                <label>Recordarme</label>
                <input type="checkbox">
            </div>

            <button type="submit">Iniciar Sesión</button>

            <p class="recuperar">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </p>

        </form>
    </div>
</main>

<footer>
    <p>© 2026 Sistema Agrícola | Todos los derechos reservados</p>
</footer>

</body>
</html>
