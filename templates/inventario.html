{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Inventario</h2>

    <!-- FORMULARIO -->
    <form method="POST" action="/agregar_producto" class="row g-3 mb-4">

        <div class="col-md-4">
            <input type="text" name="nombre_producto" class="form-control" placeholder="Nombre del producto" required>
        </div>

        <div class="col-md-3">
            <input type="number" name="cantidad" class="form-control" placeholder="Cantidad" required>
        </div>

        <div class="col-md-3">
            <input type="text" name="unidad" class="form-control" placeholder="Unidad (kg, litros...)" required>
        </div>

        <div class="col-md-2">
            <button class="btn btn-success w-100">Agregar</button>
        </div>

    </form>

    <!-- TABLA -->
    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Unidad</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            {% for p in productos %}
            <tr>
                <td>{{ p.id_producto }}</td>
                <td>{{ p.nombre_producto }}</td>
                <td>{{ p.cantidad }}</td>
                <td>{{ p.unidad }}</td>
                <td>
                    <a href="/eliminar_producto/{{ p.id_producto }}" class="btn btn-danger btn-sm">
                        Eliminar
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
