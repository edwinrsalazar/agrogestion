{% extends "base.html" %}

{% block content %}

<h2>Lista de Usuarios</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Documento</th>
<th>Correo</th>
<th>Usuario</th>
<th>Rol</th>
<th>Acciones</th>
</tr>

{% for u in usuarios %}

<tr>
<td>{{ u.id_usuario }}</td>
<td>{{ u.nombre }}</td>
<td>{{ u.documento }}</td>
<td>{{ u.correo }}</td>
<td>{{ u.username }}</td>
<td>{{ u.rol }}</td>

<td>

<a href="/editar_usuario/{{ u.id_usuario }}">Editar</a>

|

<a href="/eliminar_usuario/{{ u.id_usuario }}"
onclick="return confirm('¿Eliminar usuario?')">
Eliminar
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
