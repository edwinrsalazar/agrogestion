{% extends "base.html" %}

{% block content %}
<h2>Editar Cultivo</h2>

<form method="POST">
    <input name="nombre" value="{{ cultivo.nombre }}" required>
    <input name="tipo" value="{{ cultivo.tipo }}" required>
    <input name="tiempo_cosecha_dias" value="{{ cultivo.tiempo_cosecha_dias }}" required>
    <button type="submit">Actualizar</button>
</form>

{% endblock %}
