{% extends "base.html" %}

{% block content %}
<h2>Producción</h2>

<a href="{{ url_for('inventario.crear') }}">Registrar Producción</a>

<table border="1">
<tr>
    <th>ID</th>
    <th>Cultivo</th>
    <th>Cantidad</th>
    <th>Fecha</th>
    <th>Acciones</th>
</tr>

{% for p in inventarios %}
<tr>
    <td>{{ p.id }}</td>
    <td>{{ p.cultivo_id }}</td>
    <td>{{ p.cantidad }}</td>
    <td>{{ p.fecha }}</td>
    <td>
        <a href="{{ url_for('inventario.editar', id=p.id) }}">✏️</a>
        <a href="{{ url_for('inventario.eliminar', id=p.id) }}" onclick="return confirm('¿Seguro?')">🗑️</a>
    </td>
</tr>
{% endfor %}

</table>
{% endblock %}
